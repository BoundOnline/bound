<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --text: #f8fafc;
            --subtle: #94a3b8;
            --btn-hover: #0ea5e9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: background 0.5s; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .container { 
            width: 100%; max-width: 500px; padding: 25px; text-align: center; 
            background: var(--card); border-radius: 24px; border: 1px solid #334155;
            position: relative; max-height: 95vh; overflow-y: auto;
        }
        .hidden { display: none !important; }

        /* NEUES LAYOUT HOME SCREEN */
        .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-img { max-width: 120px; }
        
        .main-input-group { margin-bottom: 25px; }
        
        .split-layout { display: flex; gap: 20px; text-align: left; }
        .split-column { flex: 1; display: flex; flex-direction: column; }
        .column-divider { width: 1px; background: #334155; margin: 0 5px; }

        /* Admin & UI */
        .icon-btn { background: none; border: none; color: var(--subtle); cursor: pointer; font-size: 20px; opacity: 0.6; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; color: var(--accent); }

        #adminModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .admin-box { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; border: 1px solid var(--accent); }

        /* Buttons & Inputs */
        input, button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; margin-bottom: 10px; transition: all 0.2s; }
        input { background: #111827; color: white; border: 1px solid #334155; }
        button { background: var(--accent); color: #0f172a; font-weight: 800; cursor: pointer; }
        .secondary-btn { background: transparent; color: var(--text); border: 1px solid #334155; }
        .danger-btn { background: var(--danger); color: white; }

        /* Scrollbereich für Öffentliche Lobbys */
        .public-rooms-scroll { max-height: 180px; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        .public-room-item { background: #111827; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #334155; cursor: pointer; font-size: 13px; }
        .public-room-item:hover { border-color: var(--accent); }

        /* Game UI */
        .prob-container { background: #111827; border-radius: 20px; padding: 30px 10px; margin: 20px 0; position: relative; border: 2px solid #334155; }
        .prob-bar { position: absolute; bottom: 0; left: 0; width: 0%; height: 6px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 0 20px 20px; }
        #probText { font-size: 40px; font-weight: 900; }
        .trigger-btn { height: 160px; width: 160px; border-radius: 50%; border: 6px solid var(--bg); background: var(--card); color: var(--text); font-size: 18px; font-weight: 800; margin: 20px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }

        .version-tag { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: var(--subtle); opacity: 0.5; }
        #broadcastOverlay { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0f172a; padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 2000; }
    </style>
</head>
<body>

    <div id="adminModal" class="hidden">
        <div class="admin-box">
            <h3 style="margin-bottom: 15px; color: var(--accent)">Admin Panel</h3>
            <div id="adminAuth">
                <input type="password" id="adminPass" placeholder="Passwort">
                <button onclick="checkAdmin()">LOGIN</button>
                <button class="secondary-btn" onclick="closeAdmin()">ZURÜCK</button>
            </div>
            <div id="adminControls" class="hidden">
                <input type="text" id="broadcastMsg" placeholder="Nachricht an alle...">
                <button onclick="sendBroadcast()">BROADCAST</button>
                <button class="danger-btn" onclick="clearAllRooms()">ALLE LÖSCHEN</button>
                <button class="secondary-btn" onclick="closeAdmin()">SCHLIESSEN</button>
            </div>
        </div>
    </div>

    <div id="broadcastOverlay" class="hidden"></div>

    <div class="container" id="screen-home">
        <div class="home-header">
            <img src="logo2bound.png" alt="BOUND" class="logo-img">
            <button class="icon-btn" onclick="openAdmin()">⚙️</button>
        </div>

        <div class="main-input-group">
            <input type="text" id="userName" placeholder="Dein Name" autocomplete="off">
        </div>

        <div class="split-layout">
            <div class="split-column">
                <h4 style="font-size: 11px; color: var(--subtle); margin-bottom: 10px; text-transform: uppercase;">Erstellen</h4>
                <button onclick="createRoom()" style="font-size: 13px;">SPIEL ERSTELLEN</button>
                
                <div id="publicRoomsContainer" class="hidden">
                    <h4 style="font-size: 11px; color: var(--subtle); margin-top: 15px; text-transform: uppercase;">Öffentlich</h4>
                    <div id="publicList" class="public-rooms-scroll"></div>
                </div>
            </div>

            <div class="column-divider"></div>

            <div class="split-column">
                <h4 style="font-size: 11px; color: var(--subtle); margin-bottom: 10px; text-transform: uppercase;">Beitreten</h4>
                <input type="text" id="roomCodeInput" placeholder="Code" maxlength="4" style="text-align: center;">
                <button class="secondary-btn" onclick="joinRoom()" style="font-size: 13px;">BEITRETEN</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="screen-lobby">
        <div id="cleanupWarning" style="background:var(--danger); padding:10px; border-radius:10px; margin-bottom:10px; font-size:12px; display:none;">
            Inaktiv! <span onclick="refreshInactivity()" style="text-decoration:underline; cursor:pointer">VERLÄNGERN</span>
        </div>
        <h2 style="font-size: 16px;">Raum-Code</h2>
        <h1 id="displayRoomCode" style="font-size: 45px; color: var(--accent); margin-bottom: 15px;">----</h1>
        
        <div id="hostSettings" class="hidden">
            <input type="text" id="roomNameInput" placeholder="Gruppenname (Optional)" oninput="updateRoomName()">
            <button class="secondary-btn" id="visBtn" onclick="toggleVisibility()" style="font-size: 12px; margin-bottom: 20px;">SICHTBARKEIT: PRIVAT</button>
        </div>

        <div id="lobbyPlayerList" style="text-align: left; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 5px;"></div>
        <button id="startBtn" onclick="startOnlineGame()" style="display:none; margin-top: 20px;">SPIEL STARTEN</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="turnInfo" style="margin-bottom: 10px; font-weight: bold; color: var(--subtle)">-</div>
        <div class="prob-container">
            <div id="probText">2%</div>
            <div class="prob-bar" id="probFill"></div>
        </div>
        <div class="trigger-btn" id="mainTrigger" onclick="handleAction()">DRÜCKEN</div>
        <div id="onlineScoreBoard" style="margin-top: 10px;"></div>
    </div>

    <div class="version-tag">Beta V1.2</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrFeaJLo7LS6hHml8yu8Fh7Z4mklh38uw",
            authDomain: "boundonline-538df.firebaseapp.com",
            databaseURL: "https://boundonline-538df-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "boundonline-538df",
            storageBucket: "boundonline-538df.firebasestorage.app",
            messagingSenderId: "144308798711",
            appId: "1:144308798711:web:ef6f0d619896e533f57ff2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = ""; 
        let roomCode = sessionStorage.getItem('activeRoom') || ""; 
        let isHost = sessionStorage.getItem('isHost') === 'true';
        const explosionSounds = [new Audio('a1.mp3'), new Audio('a2.mp3'), new Audio('a3.mp3')];

        db.ref('broadcast').on('value', s => {
            const msg = s.val();
            if(msg) {
                const el = document.getElementById('broadcastOverlay');
                el.innerText = msg; el.classList.remove('hidden');
                setTimeout(() => el.classList.add('hidden'), 5000);
            }
        });

        if(roomCode) { window.onload = () => { myName = "Spieler"; listen(); }; }

        db.ref('rooms').orderByChild('visibility').equalTo('public').on('value', s => {
            const rooms = s.val();
            const container = document.getElementById('publicRoomsContainer');
            if(!rooms) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            document.getElementById('publicList').innerHTML = Object.keys(rooms).map(code => {
                const r = rooms[code];
                if(r.status !== 'lobby') return '';
                return `<div class="public-room-item" onclick="quickJoin('${code}')">
                    <strong>${r.roomName || "Gruppe"}</strong><br>
                    <small>Host: ${r.players[0].name}</small>
                </div>`;
            }).join('');
        });

        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { 
            document.getElementById('adminModal').classList.add('hidden');
            document.getElementById('adminAuth').classList.remove('hidden');
            document.getElementById('adminControls').classList.add('hidden');
            document.getElementById('adminPass').value = "";
        }
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "135369") {
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
            } else { alert("Falsch!"); }
        }
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(msg) db.ref('broadcast').set(msg).then(() => {
                document.getElementById('broadcastMsg').value = "";
                setTimeout(() => db.ref('broadcast').set(null), 1000);
            });
        }
        function clearAllRooms() { if(confirm("Alle Räume löschen?")) db.ref('rooms').remove(); }

        function createRoom() {
            myName = document.getElementById('userName').value.trim();
            if(!myName) return alert("Wie heißt du?");
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            sessionStorage.setItem('activeRoom', roomCode);
            sessionStorage.setItem('isHost', 'true');
            db.ref('rooms/' + roomCode).set({ 
                status: 'lobby', visibility: 'private', roomName: '',
                lastActive: Date.now(), currentProb: 2, turnIndex: 0, 
                players: [{ name: myName, score: 0 }] 
            });
            listen();
        }

        function quickJoin(code) { document.getElementById('roomCodeInput').value = code; joinRoom(); }

        function joinRoom() {
            myName = document.getElementById('userName').value.trim();
            roomCode = document.getElementById('roomCodeInput').value.trim();
            if(!myName || !roomCode) return alert("Name & Code eingeben!");
            db.ref('rooms/' + roomCode).once('value', s => {
                if(!s.exists()) return alert("Raum existiert nicht!");
                let p = s.val().players || [];
                p.push({ name: myName, score: 0 });
                sessionStorage.setItem('activeRoom', roomCode);
                db.ref('rooms/' + roomCode).update({ players: p, lastActive: Date.now() });
                listen();
            });
        }

        function listen() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('displayRoomCode').innerText = "#" + roomCode;
            if(isHost) document.getElementById('hostSettings').classList.remove('hidden');

            db.ref('rooms/' + roomCode).on('value', s => {
                const d = s.val(); if(!d) { exitRoom(); return; }
                const visBtn = document.getElementById('visBtn');
                visBtn.innerText = "SICHTBARKEIT: " + d.visibility.toUpperCase();

                if(d.status === 'lobby') {
                    document.getElementById('lobbyPlayerList').innerHTML = d.players.map(p => `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.05)">• ${p.name}</div>`).join('');
                    if(isHost && d.players.length >= 2) document.getElementById('startBtn').style.display='block';
                } else { updateUI(d); }
            });
        }

        function toggleVisibility() {
            if(!isHost) return;
            db.ref('rooms/' + roomCode + '/visibility').once('value', s => {
                db.ref('rooms/' + roomCode).update({ visibility: s.val() === 'public' ? 'private' : 'public', lastActive: Date.now() });
            });
        }

        function updateRoomName() { db.ref('rooms/' + roomCode).update({ roomName: document.getElementById('roomNameInput').value, lastActive: Date.now() }); }
        function startOnlineGame() { db.ref('rooms/' + roomCode).update({ status: 'playing', lastActive: Date.now() }); }

        function updateUI(d) {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            const isMe = d.players[d.turnIndex].name === myName;
            document.getElementById('turnInfo').innerText = isMe ? "DU BIST DRAN!" : `${d.players[d.turnIndex].name} ist dran...`;
            document.getElementById('probFill').style.width = d.currentProb + "%";
            document.getElementById('probText').innerText = Math.floor(d.currentProb) + "%";
            document.getElementById('onlineScoreBoard').innerHTML = d.players.map((p, i) => `
                <div style="display:flex;justify-content:space-between;padding:8px;background:${i===d.turnIndex?'rgba(56,189,248,0.2)':'transparent'};border-radius:8px;font-size:14px">
                    <span>${p.name}</span><span>${p.score}</span>
                </div>`).join('');
            const trigger = document.getElementById('mainTrigger');
            trigger.style.opacity = isMe ? "1" : "0.3";
            trigger.style.pointerEvents = isMe ? "auto" : "none";
        }

        function handleAction() {
            db.ref('rooms/' + roomCode).once('value', s => {
                let d = s.val();
                if(Math.random() * 100 < d.currentProb) {
                    explosionSounds[Math.floor(Math.random()*3)].play();
                    d.currentProb = 2;
                } else {
                    d.players[d.turnIndex].score += Math.floor(d.currentProb);
                    d.currentProb += 2;
                }
                d.turnIndex = (d.turnIndex + 1) % d.players.length;
                d.lastActive = Date.now();
                db.ref('rooms/' + roomCode).update(d);
            });
        }

        function exitRoom() { sessionStorage.clear(); location.reload(); }
        function refreshInactivity() { if(roomCode) db.ref('rooms/' + roomCode).update({ lastActive: Date.now() }); }
        
        setInterval(() => {
            if (!roomCode) return;
            db.ref('rooms/' + roomCode + '/lastActive').once('value', s => {
                const lastActive = s.val();
                if (!lastActive) return;
                const diff = (Date.now() - lastActive) / 1000;
                if (diff > 180) exitRoom();
                else if (diff > 140 && isHost) document.getElementById('cleanupWarning').style.display = 'block';
                else document.getElementById('cleanupWarning').style.display = 'none';
            });
        }, 5000);
    </script>
</body>
</html>
