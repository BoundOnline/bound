<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --text: #f8fafc;
            --subtle: #94a3b8;
            --btn-hover: #0ea5e9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: background 0.5s; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .container { 
            width: 100%; max-width: 400px; padding: 30px 20px; text-align: center; 
            background: var(--card); border-radius: 20px; border: 1px solid #334155;
            position: relative; max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none !important; }

        /* Admin & UI Icons */
        .top-right-tools { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 100; }
        .icon-btn { background: none; border: none; color: var(--subtle); cursor: pointer; padding: 5px; width: auto; margin: 0; opacity: 0.5; }
        .icon-btn:hover { opacity: 1; }

        /* Admin Modal */
        #adminModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .admin-box { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 380px; border: 1px solid var(--accent); }
        
        /* Admin Dashboard Styles */
        .admin-dashboard { max-height: 250px; overflow-y: auto; text-align: left; font-size: 12px; margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px; }
        .admin-room-card { background: #111827; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .admin-player-line { display: flex; justify-content: space-between; align-items: center; color: var(--subtle); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .pn-btn { background: var(--accent); color: #0f172a; padding: 2px 8px; font-size: 10px; border-radius: 4px; width: auto; margin: 0; font-weight: bold; }

        /* Broadcast Overlay */
        #broadcastOverlay {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #0f172a; padding: 15px 25px; 
            border-radius: 50px; font-weight: bold; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown { from { transform: translate(-50%, -100%); } to { transform: translate(-50%, 0); } }

        /* Restliche Styles */
        #cleanupWarning { background: var(--danger); color: white; padding: 12px; font-size: 13px; font-weight: bold; border-radius: 12px; margin-bottom: 15px; display: none; }
        .refresh-link { text-decoration: underline; cursor: pointer; margin-left: 8px; color: #fff; }
        input, select, button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; margin-bottom: 12px; transition: all 0.2s; }
        input { background: #111827; color: white; border: 1px solid #334155; }
        button { background: var(--accent); color: #0f172a; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .secondary-btn { background: transparent; color: var(--text); border: 1px solid #334155; }
        .danger-btn { background: var(--danger); color: white; }
        .divider { font-size: 10px; color: var(--subtle); margin: 5px 0 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* Toggle Switch */
        .toggle-container { display: flex; background: #111827; border-radius: 50px; padding: 4px; margin: 10px 0 20px; border: 1px solid #334155; position: relative; }
        .toggle-option { flex: 1; padding: 10px; cursor: pointer; z-index: 2; font-size: 14px; font-weight: bold; color: var(--subtle); }
        .toggle-option.active { color: #0f172a; }
        .toggle-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: var(--accent); border-radius: 50px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; }
        .is-public .toggle-slider { transform: translateX(100%); }

        .public-rooms { margin-top: 15px; text-align: left; }
        .public-room-item { background: #111827; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #334155; cursor: pointer; }
        .prob-container { background: #111827; border-radius: 20px; padding: 40px 20px; margin: 20px 0; position: relative; border: 2px solid #334155; }
        .prob-bar { position: absolute; bottom: 0; left: 0; width: 0%; height: 8px; background: var(--accent); transition: width 0.4s ease; border-radius: 0 0 20px 20px; }
        #probText { font-size: 48px; font-weight: 900; }
        .trigger-btn { height: 180px; width: 180px; border-radius: 50%; border: 8px solid var(--bg); background: var(--card); color: var(--text); font-size: 20px; font-weight: 800; margin: 30px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); cursor: pointer; user-select: none; }
        .version-tag { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 10px; color: var(--subtle); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="top-right-tools">
        <button class="icon-btn" onclick="openAdmin()">⚙️</button>
    </div>

    <div id="adminModal" class="hidden">
        <div class="admin-box">
            <h3 style="margin-bottom: 15px; color: var(--accent)">Admin Panel</h3>
            <div id="adminAuth">
                <input type="password" id="adminPass" placeholder="Passwort">
                <button onclick="checkAdmin()">LOGIN</button>
                <button class="secondary-btn" onclick="closeAdmin()">ABBRECHEN</button>
            </div>
            <div id="adminControls" class="hidden">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="broadcastMsg" placeholder="Globaler Broadcast...">
                    <button onclick="sendBroadcast()" style="width: 60px; padding: 0;">📣</button>
                </div>
                <div id="adminStats" style="font-size: 12px; color: var(--accent); margin-bottom: 10px; text-align: left;">
                    Aktive Räume: <span id="roomCount">0</span>
                </div>
                <div class="admin-dashboard" id="adminDashboard">Lade Daten...</div>
                <button class="danger-btn" onclick="clearAllRooms()" style="margin-top: 10px; padding: 10px; font-size: 12px;">ALLE GRUPPEN LÖSCHEN</button>
                <button class="secondary-btn" onclick="closeAdmin()">SCHLIESSEN</button>
            </div>
        </div>
    </div>

    <div id="broadcastOverlay" class="hidden"></div>

    <div class="container" id="screen-home">
        <div class="logo-area">
            <img src="logo2bound.png" alt="BOUND" style="max-width: 140px; margin-bottom: 20px;">
        </div>
        <input type="text" id="userName" placeholder="Dein Name" autocomplete="off">
        <button onclick="createRoom()">SPIEL ERSTELLEN</button>
        <div class="divider">oder</div>
        <input type="text" id="roomCodeInput" placeholder="4-stelliger Code">
        <button class="secondary-btn" onclick="joinRoom()">BEITRETEN</button>
        <div id="publicRoomsContainer" class="hidden">
            <div class="divider">Öffentliche Lobbys</div>
            <div id="publicList" class="public-rooms"></div>
        </div>
    </div>

    <div class="container hidden" id="screen-lobby">
        <div id="cleanupWarning">Lobby inaktiv! <span class="refresh-link" onclick="refreshInactivity()">VERLÄNGERN</span></div>
        <h2 style="margin-bottom: 5px;">Lobby</h2>
        <h1 id="displayRoomCode" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;">----</h1>
        <div id="hostSettings" class="hidden">
            <input type="text" id="roomNameInput" placeholder="Name der Gruppe" oninput="updateRoomName()">
            <div class="toggle-container" id="visibilityToggle" onclick="toggleVisibility()">
                <div class="toggle-slider"></div>
                <div class="toggle-option" id="opt-private">PRIVAT</div>
                <div class="toggle-option" id="opt-public">ÖFFENTLICH</div>
            </div>
        </div>
        <div id="lobbyPlayerList" style="margin-bottom: 20px; text-align: left; background: rgba(0,0,0,0.2); border-radius: 12px;"></div>
        <button id="startBtn" onclick="startOnlineGame()" style="display:none">SPIEL STARTEN</button>
        <div id="roomMemberActions" style="margin-top: 10px;">
            <button class="danger-btn hidden" id="hostDeleteBtn" onclick="deleteMyRoom()">GRUPPE LÖSCHEN</button>
            <button class="secondary-btn hidden" id="playerLeaveBtn" onclick="leaveRoom()">GRUPPE VERLASSEN</button>
        </div>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="turnInfo" style="margin-bottom: 10px; font-weight: bold; color: var(--subtle)">-</div>
        <div class="prob-container">
            <div id="probText">2%</div>
            <div class="prob-bar" id="probFill"></div>
        </div>
        <div class="trigger-btn" id="mainTrigger" onclick="handleAction()">DRÜCKEN</div>
        <div class="score-board" id="onlineScoreBoard"></div>
        <button class="secondary-btn" style="margin-top: 20px; padding: 10px; font-size: 12px;" onclick="isHost ? deleteMyRoom() : leaveRoom()">
            SPIEL ABBRECHEN / VERLASSEN
        </button>
    </div>

    <div class="version-tag">Beta V1.2</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrFeaJLo7LS6hHml8yu8Fh7Z4mklh38uw",
            authDomain: "boundonline-538df.firebaseapp.com",
            databaseURL: "https://boundonline-538df-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "boundonline-538df",
            storageBucket: "boundonline-538df.firebasestorage.app",
            messagingSenderId: "144308798711",
            appId: "1:144308798711:web:ef6f0d619896e533f57ff2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = ""; 
        let roomCode = sessionStorage.getItem('activeRoom') || ""; 
        let isHost = sessionStorage.getItem('isHost') === 'true';
        const explosionSounds = [new Audio('a1.mp3'), new Audio('a2.mp3'), new Audio('a3.mp3')];

        // Broadcast Listener (Global)
        db.ref('broadcast').on('value', s => {
            const msg = s.val();
            if(msg) {
                const el = document.getElementById('broadcastOverlay');
                el.innerText = msg; el.classList.remove('hidden');
                setTimeout(() => el.classList.add('hidden'), 5000);
            }
        });

        // Re-Join Logic
        if(roomCode) { 
            window.onload = () => { 
                myName = sessionStorage.getItem('myName') || "Spieler"; 
                listen(); 
            }; 
        }

        // Public Rooms
        db.ref('rooms').orderByChild('visibility').equalTo('public').on('value', s => {
            const rooms = s.val();
            const container = document.getElementById('publicRoomsContainer');
            if(!rooms) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            document.getElementById('publicList').innerHTML = Object.keys(rooms).map(code => {
                const r = rooms[code];
                if(r.status !== 'lobby') return '';
                return `<div class="public-room-item" onclick="quickJoin('${code}')">
                    <span style="font-weight:800;color:var(--accent);display:block">${r.roomName || "Gruppe"}</span>
                    <span style="font-size:12px;color:var(--subtle)">Host: ${r.players[0].name} • #${code}</span>
                </div>`;
            }).join('');
        });

        // Inactivity Timer
        setInterval(() => {
            if (!roomCode) return;
            db.ref('rooms/' + roomCode + '/lastActive').once('value', s => {
                const lastActive = s.val();
                if (!lastActive) return;
                const diff = (Date.now() - lastActive) / 1000;
                if (diff > 180) {
                    if (isHost) { deleteMyRoom(); } 
                    else { exitRoom(); }
                } else if (diff > 140 && isHost) { document.getElementById('cleanupWarning').style.display = 'block'; } 
                else { document.getElementById('cleanupWarning').style.display = 'none'; }
            });
        }, 5000);

        function refreshInactivity() { if(roomCode) db.ref('rooms/' + roomCode).update({ lastActive: Date.now() }); }
        function exitRoom() { sessionStorage.clear(); location.reload(); }

        // Host/Player Actions
        function deleteMyRoom() {
            if(!roomCode || !isHost) return;
            if(confirm("Möchtest du die Gruppe wirklich für alle löschen?")) {
                db.ref('rooms/' + roomCode).remove().then(() => exitRoom());
            }
        }

        function leaveRoom() {
            if(!roomCode || isHost) return;
            if(confirm("Möchtest du die Gruppe verlassen?")) {
                db.ref('rooms/' + roomCode + '/players').once('value', s => {
                    let players = s.val() || [];
                    let newPlayers = players.filter(p => p.name !== myName);
                    db.ref('rooms/' + roomCode).update({ players: newPlayers, lastActive: Date.now() }).then(() => exitRoom());
                });
            }
        }

        // Admin Functions
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { 
            document.getElementById('adminModal').classList.add('hidden');
            document.getElementById('adminAuth').classList.remove('hidden');
            document.getElementById('adminControls').classList.add('hidden');
            document.getElementById('adminPass').value = "";
        }
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "135369") {
                document.getElementById('adminAuth').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                startAdminDashboard();
            } else { alert("Falsches Passwort"); }
        }
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if(msg) db.ref('broadcast').set(msg).then(() => {
                document.getElementById('broadcastMsg').value = "";
                setTimeout(() => db.ref('broadcast').set(null), 1000);
            });
        }
        function clearAllRooms() { if(confirm("Wirklich ALLE Räume löschen?")) db.ref('rooms').remove(); }

        function startAdminDashboard() {
            db.ref('rooms').on('value', snapshot => {
                const rooms = snapshot.val();
                const dashboard = document.getElementById('adminDashboard');
                const countEl = document.getElementById('roomCount');
                if (!rooms) { dashboard.innerHTML = "Keine aktiven Räume."; countEl.innerText = "0"; return; }
                const roomKeys = Object.keys(rooms);
                countEl.innerText = roomKeys.length;
                dashboard.innerHTML = roomKeys.map(code => {
                    const r = rooms[code];
                    const players = r.players || [];
                    const hostName = players[0] ? players[0].name : "---";
                    let playerHtml = players.map(p => `
                        <div class="admin-player-line">
                            <span>• ${p.name}</span>
                            <button class="pn-btn" onclick="sendPrivateMsg('${code}', '${p.name}')">PN</button>
                        </div>
                    `).join('');
                    return `<div class="admin-room-card">
                        <div style="font-weight:bold; color:var(--accent)">#${code} (${r.status})</div>
                        <div style="font-size:10px; margin-bottom:5px; color:var(--subtle)">Host: ${hostName} | Name: ${r.roomName || '-'}</div>
                        ${playerHtml}
                    </div>`;
                }).join('');
            });
        }

        function sendPrivateMsg(code, targetName) {
            const msg = prompt(`Nachricht an ${targetName} im Raum ${code}:`);
            if (msg) {
                db.ref('rooms/' + code + '/adminMsg').set({ to: targetName, text: msg, ts: Date.now() })
                .then(() => setTimeout(() => db.ref('rooms/' + code + '/adminMsg').remove(), 500));
            }
        }

        // Core Game Functions
        function createRoom() {
            myName = document.getElementById('userName').value.trim();
            if(!myName) return alert("Name?");
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            sessionStorage.setItem('activeRoom', roomCode);
            sessionStorage.setItem('isHost', 'true');
            sessionStorage.setItem('myName', myName);
            db.ref('rooms/' + roomCode).set({ 
                status: 'lobby', visibility: 'private', roomName: '',
                lastActive: Date.now(), currentProb: 2, turnIndex: 0, 
                players: [{ name: myName, score: 0 }] 
            });
            listen();
        }

        function quickJoin(code) { document.getElementById('roomCodeInput').value = code; joinRoom(); }

        function joinRoom() {
            myName = document.getElementById('userName').value.trim();
            roomCode = document.getElementById('roomCodeInput').value.trim();
            if(!myName || !roomCode) return alert("Name & Code?");
            db.ref('rooms/' + roomCode).once('value', s => {
                if(!s.exists()) return alert("Raum nicht gefunden!");
                let p = s.val().players || [];
                // Check if name already taken
                if(p.some(player => player.name === myName)) {
                    myName += Math.floor(Math.random()*10);
                }
                p.push({ name: myName, score: 0 });
                isHost = false;
                sessionStorage.setItem('activeRoom', roomCode);
                sessionStorage.setItem('isHost', 'false');
                sessionStorage.setItem('myName', myName);
                db.ref('rooms/' + roomCode).update({ players: p, lastActive: Date.now() });
                listen();
            });
        }

        function listen() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('displayRoomCode').innerText = "#" + roomCode;
            
            if(isHost) {
                document.getElementById('hostSettings').classList.remove('hidden');
                document.getElementById('hostDeleteBtn').classList.remove('hidden');
            } else {
                document.getElementById('playerLeaveBtn').classList.remove('hidden');
            }

            // Listener für PN vom Admin
            db.ref('rooms/' + roomCode + '/adminMsg').on('value', s => {
                const data = s.val();
                if(data && data.to === myName) alert("ADMIN NACHRICHT:\n" + data.text);
            });

            db.ref('rooms/' + roomCode).on('value', s => {
                const d = s.val(); if(!d) { exitRoom(); return; }
                const toggle = document.getElementById('visibilityToggle');
                if(d.visibility === 'public') toggle.classList.add('is-public'); else toggle.classList.remove('is-public');

                if(d.status === 'lobby') {
                    document.getElementById('lobbyPlayerList').innerHTML = d.players.map(p => `<div style="padding:12px; border-bottom:1px solid rgba(255,255,255,0.05)">• ${p.name}</div>`).join('');
                    if(isHost && d.players.length >= 2) document.getElementById('startBtn').style.display='block';
                } else { updateUI(d); }
            });
        }

        function toggleVisibility() {
            if(!isHost) return;
            db.ref('rooms/' + roomCode + '/visibility').once('value', s => {
                db.ref('rooms/' + roomCode).update({ visibility: s.val() === 'public' ? 'private' : 'public', lastActive: Date.now() });
            });
        }

        function updateRoomName() { db.ref('rooms/' + roomCode).update({ roomName: document.getElementById('roomNameInput').value, lastActive: Date.now() }); }
        function startOnlineGame() { db.ref('rooms/' + roomCode).update({ status: 'playing', lastActive: Date.now() }); }

        function updateUI(d) {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            const isMe = d.players[d.turnIndex].name === myName;
            document.getElementById('turnInfo').innerText = isMe ? "DU BIST DRAN!" : `${d.players[d.turnIndex].name} ist dran...`;
            document.getElementById('probFill').style.width = d.currentProb + "%";
            document.getElementById('probText').innerText = d.currentProb + "%";
            document.getElementById('onlineScoreBoard').innerHTML = d.players.map((p, i) => `
                <div style="display:flex;justify-content:space-between;padding:10px;background:${i===d.turnIndex?'rgba(56,189,248,0.2)':'transparent'};border-radius:10px">
                    <span>${p.name}</span><span>${p.score}</span>
                </div>`).join('');
            const trigger = document.getElementById('mainTrigger');
            trigger.style.opacity = isMe ? "1" : "0.3";
            trigger.style.pointerEvents = isMe ? "auto" : "none";
        }

        function handleAction() {
            db.ref('rooms/' + roomCode).once('value', s => {
                let d = s.val();
                if(Math.random() * 100 < d.currentProb) {
                    explosionSounds[Math.floor(Math.random()*3)].play();
                    d.currentProb = 2;
                } else {
                    d.players[d.turnIndex].score += Math.floor(d.currentProb);
                    d.currentProb += 2;
                }
                d.turnIndex = (d.turnIndex + 1) % d.players.length;
                d.lastActive = Date.now();
                db.ref('rooms/' + roomCode).update(d);
            });
        }
    </script>
</body>
</html>
