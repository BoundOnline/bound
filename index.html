<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --danger: #ef4444; --text: #f8fafc; --subtle: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; min-height: 100vh; overflow-x: hidden; 
        }
        
        .container { 
            width: 90%; max-width: 500px; padding: 25px; text-align: center; 
            background: var(--card); border-radius: 24px; border: 1px solid #334155;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .hidden { display: none !important; }

        input, button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; margin-bottom: 10px; }
        input { background: #111827; color: white; border: 1px solid #334155; }
        button { background: var(--accent); color: #0f172a; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .secondary-btn { background: #334155; color: white; }

        .split-layout { display: flex; gap: 15px; text-align: left; margin-top: 10px; }
        .split-column { flex: 1; }
        .column-divider { width: 1px; background: #334155; }
        .column-label { font-size: 10px; color: var(--subtle); text-transform: uppercase; margin-bottom: 5px; }

        #publicRoomsContainer { width: 90%; max-width: 500px; margin-top: 20px; }
        .public-title { font-size: 22px; font-weight: 800; color: var(--danger); text-align: left; margin-bottom: 10px; }
        .public-room-item { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #334155; cursor: pointer; display: flex; justify-content: space-between; }

        .prob-container { background: #111827; border-radius: 20px; padding: 30px 10px; margin: 20px 0; position: relative; overflow: hidden; }
        .prob-bar { position: absolute; bottom: 0; left: 0; height: 6px; background: var(--accent); transition: width 0.4s; }
        #probText { font-size: 45px; font-weight: 900; }
        
        .trigger-btn { 
            height: 160px; width: 160px; border-radius: 50%; border: 6px solid var(--bg); 
            background: var(--card); color: var(--text); font-size: 18px; font-weight: 800; 
            margin: 20px auto; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .version-tag { position: fixed; bottom: 10px; font-size: 10px; color: var(--subtle); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container" id="screen-home">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="letter-spacing: 2px;">BOUND</h2>
            <span onclick="openAdmin()" style="cursor:pointer; opacity:0.5">⚙️</span>
        </div>
        
        <input type="text" id="userName" placeholder="Dein Name" autocomplete="off">

        <div class="split-layout">
            <div class="split-column">
                <div class="column-label">Erstellen</div>
                <button onclick="createRoom()">SPIEL ERSTELLEN</button>
            </div>
            <div class="column-divider"></div>
            <div class="split-column">
                <div class="column-label">Beitreten</div>
                <input type="text" id="roomCodeInput" placeholder="Code" maxlength="4" style="text-align: center;">
                <button class="secondary-btn" onclick="joinRoom()">BEITRETEN</button>
            </div>
        </div>
    </div>

    <div id="publicRoomsContainer" class="hidden">
        <h2 class="public-title">öffentlich</h2>
        <div id="publicList"></div>
    </div>

    <div class="container hidden" id="screen-lobby">
        <h1 id="displayRoomCode" style="font-size: 50px; color: var(--accent);">----</h1>
        <div id="hostSettings" class="hidden">
            <input type="text" id="roomNameInput" placeholder="Gruppenname" oninput="updateRoomName()" style="margin-top:15px">
            <button class="secondary-btn" id="visBtn" onclick="toggleVisibility()">PRIVAT</button>
        </div>
        <div id="lobbyPlayerList" style="margin-top:20px; text-align:left; color: var(--subtle)"></div>
        <button id="startBtn" onclick="startOnlineGame()" style="display:none; margin-top: 20px; background: #22c55e; color: white;">SPIEL STARTEN</button>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="turnInfo" style="font-weight:bold; margin-bottom: 10px;">Laden...</div>
        <div class="prob-container">
            <div id="probText">2%</div>
            <div class="prob-bar" id="probFill" style="width: 2%;"></div>
        </div>
        <div class="trigger-btn" id="mainTrigger" onclick="handleAction()">DRÜCKEN</div>
        <div id="onlineScoreBoard" style="margin-top: 15px; font-size: 14px;"></div>
    </div>

    <div id="adminModal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; display:flex; align-items:center; justify-content:center;">
        <div class="container" style="max-width:300px">
            <input type="password" id="adminPass" placeholder="Admin Passwort">
            <button onclick="checkAdmin()">LOGIN</button>
            <button class="secondary-btn" onclick="closeAdmin()">X</button>
        </div>
    </div>

    <div class="version-tag">Beta V1.2</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCrFeaJLo7LS6hHml8yu8Fh7Z4mklh38uw",
            authDomain: "boundonline-538df.firebaseapp.com",
            databaseURL: "https://boundonline-538df-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "boundonline-538df",
            storageBucket: "boundonline-538df.firebasestorage.app",
            messagingSenderId: "144308798711",
            appId: "1:144308798711:web:ef6f0d619896e533f57ff2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = ""; 
        let roomCode = ""; 
        let isHost = false;
        const explosionSounds = [new Audio('a1.mp3'), new Audio('a2.mp3'), new Audio('a3.mp3')];

        // Public Rooms
        db.ref('rooms').orderByChild('visibility').equalTo('public').on('value', s => {
            const rooms = s.val();
            const container = document.getElementById('publicRoomsContainer');
            if(!rooms) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            document.getElementById('publicList').innerHTML = Object.keys(rooms).map(code => {
                const r = rooms[code];
                if(r.status !== 'lobby') return '';
                return `<div class="public-room-item" onclick="quickJoin('${code}')">
                    <span>${r.roomName || 'Unbenannt'}</span>
                    <span style="color:var(--accent)">#${code}</span>
                </div>`;
            }).join('');
        });

        function createRoom() {
            myName = document.getElementById('userName').value.trim();
            if(!myName) return alert("Gib einen Namen ein!");
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            db.ref('rooms/' + roomCode).set({
                status: 'lobby', visibility: 'private', currentProb: 2, turnIndex: 0,
                lastActive: Date.now(), players: [{ name: myName, score: 0 }]
            }).then(listen);
        }

        function joinRoom() {
            myName = document.getElementById('userName').value.trim();
            roomCode = document.getElementById('roomCodeInput').value.trim();
            if(!myName || !roomCode) return alert("Name & Code?");
            db.ref('rooms/' + roomCode).once('value', s => {
                if(!s.exists()) return alert("Raum nicht gefunden!");
                let d = s.val();
                let p = d.players || [];
                p.push({ name: myName, score: 0 });
                db.ref('rooms/' + roomCode).update({ players: p, lastActive: Date.now() }).then(listen);
            });
        }

        function listen() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('publicRoomsContainer').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('displayRoomCode').innerText = "#" + roomCode;
            if(isHost) document.getElementById('hostSettings').classList.remove('hidden');

            db.ref('rooms/' + roomCode).on('value', s => {
                const d = s.val(); if(!d) return;
                if(d.status === 'lobby') {
                    document.getElementById('lobbyPlayerList').innerHTML = d.players.map(p => `<div>• ${p.name}</div>`).join('');
                    if(isHost && d.players.length >= 2) document.getElementById('startBtn').style.display = 'block';
                } else {
                    showGame(d);
                }
            });
        }

        function showGame(d) {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            
            const currentPlayer = d.players[d.turnIndex];
            const isMe = currentPlayer.name === myName;

            document.getElementById('turnInfo').innerText = isMe ? "DU BIST DRAN!" : `${currentPlayer.name} ist dran...`;
            document.getElementById('probText').innerText = Math.floor(d.currentProb) + "%";
            document.getElementById('probFill').style.width = d.currentProb + "%";
            
            const btn = document.getElementById('mainTrigger');
            btn.style.opacity = isMe ? "1" : "0.2";
            btn.style.pointerEvents = isMe ? "auto" : "none";

            document.getElementById('onlineScoreBoard').innerHTML = d.players.map(p => 
                `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #334155">
                    <span>${p.name}</span><b>${p.score}</b>
                </div>`).join('');
        }

        function handleAction() {
            db.ref('rooms/' + roomCode).once('value', s => {
                let d = s.val();
                if(!d) return;
                
                if(Math.random() * 100 < d.currentProb) {
                    explosionSounds[Math.floor(Math.random()*3)].play();
                    d.currentProb = 2;
                } else {
                    d.players[d.turnIndex].score += Math.floor(d.currentProb);
                    d.currentProb += 2;
                }
                
                d.turnIndex = (d.turnIndex + 1) % d.players.length;
                d.lastActive = Date.now();
                db.ref('rooms/' + roomCode).update(d);
            });
        }

        function startOnlineGame() { db.ref('rooms/' + roomCode).update({ status: 'playing' }); }
        function toggleVisibility() {
            db.ref('rooms/' + roomCode + '/visibility').once('value', s => {
                let next = s.val() === 'public' ? 'private' : 'public';
                db.ref('rooms/' + roomCode).update({ visibility: next });
                document.getElementById('visBtn').innerText = next.toUpperCase();
            });
        }
        function quickJoin(c) { document.getElementById('roomCodeInput').value = c; joinRoom(); }
        function openAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        function checkAdmin() { if(document.getElementById('adminPass').value === "135369") alert("Admin Modus bereit"); }
    </script>
</body>
</html>
