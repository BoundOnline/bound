<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUND - Social Roulette</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --text: #f8fafc;
            --subtle: #94a3b8;
        }
        .midnight { --bg: #020617; --accent: #6366f1; }
        .crimson { --bg: #450a0a; --accent: #f87171; }
        .emerald { --bg: #064e3b; --accent: #34d399; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: background 0.5s; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        /* Logo */
        .logo-area { margin-bottom: 30px; }
        .logo-symbol { width: 60px; height: 60px; margin: 0 auto 10px; position: relative; }
        .symbol-hex { background: var(--accent); width: 100%; height: 100%; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); }

        /* UI Elements */
        input, select, button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; margin-bottom: 12px; }
        input { background: var(--card); color: white; border: 1px solid #334155; }
        button { background: var(--accent); color: #0f172a; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .secondary-btn { background: #334155; color: white; }

        /* Game UI */
        .prob-container { background: var(--card); border-radius: 20px; padding: 40px 20px; margin: 20px 0; position: relative; border: 2px solid #334155; }
        .prob-bar { position: absolute; bottom: 0; left: 0; width: 0%; height: 8px; background: var(--accent); transition: width 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); border-radius: 0 0 20px 20px; }
        #probText { font-size: 42px; font-weight: 900; letter-spacing: -1px; }
        
        .trigger-btn { height: 180px; width: 180px; border-radius: 50%; border: 8px solid var(--card); background: var(--bg); color: var(--text); font-size: 20px; font-weight: bold; margin: 30px auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .active-turn .trigger-btn { border-color: var(--accent); box-shadow: 0 0 40px rgba(56, 189, 248, 0.3); }

        .score-board { background: var(--card); border-radius: 15px; padding: 15px; margin-top: 20px; text-align: left; }
        .score-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        .score-row.active { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="screen-home">
        <div class="logo-area">
            <div class="logo-symbol"><div class="symbol-hex"></div></div>
            <h1>BOUND</h1>
            <p style="color: var(--subtle)">Social Roulette</p>
        </div>
        <input type="text" id="userName" placeholder="Dein Name">
        <select id="themeSelect" onchange="changeTheme()">
            <option value="">Default Theme</option>
            <option value="midnight">Midnight Blue</option>
            <option value="crimson">Crimson Red</option>
            <option value="emerald">Emerald Green</option>
        </select>
        <button onclick="createRoom()">SPIEL ERSTELLEN</button>
        <p style="margin: 10px 0; font-size: 12px; color: var(--subtle)">ODER</p>
        <input type="text" id="roomCodeInput" placeholder="4-stelliger Code">
        <button class="secondary-btn" onclick="joinRoom()">BEITRETEN</button>
    </div>

    <div class="container hidden" id="screen-lobby">
        <h2>Raum-Code</h2>
        <h1 id="displayRoomCode" style="font-size: 50px; color: var(--accent); margin: 20px 0;">----</h1>
        <div id="lobbyPlayerList" style="margin-bottom: 20px;"></div>
        <button id="startBtn" onclick="startOnlineGame()" style="display:none">SPIEL STARTEN</button>
        <p style="color: var(--subtle)">Warte auf Mitspieler...</p>
    </div>

    <div class="container hidden" id="screen-game">
        <div id="turnInfo" style="margin-bottom: 10px; font-weight: bold; color: var(--subtle)">-</div>
        <div class="prob-container">
            <div id="probText">2%</div>
            <div style="font-size: 12px; color: var(--subtle); letter-spacing: 2px;">EXPLOSIONSGEFAHR</div>
            <div class="prob-bar" id="probFill"></div>
        </div>

        <div class="trigger-btn" id="mainTrigger" onclick="handleAction()">
            <span id="triggerLabel">DRÜCKEN</span>
        </div>

        <div class="score-board" id="onlineScoreBoard"></div>
    </div>

    <script>
        // --- FIREBASE KONFIGURATION ---
        // Ersetze diese Daten mit deinen eigenen Firebase-Zugangsdaten!
        const firebaseConfig = {
            apiKey: "DEIN_API_KEY",
            authDomain: "DEIN_PROJEKT.firebaseapp.com",
            databaseURL: "https://DEIN_PROJEKT-default-rtdb.firebaseio.com",
            projectId: "DEIN_PROJEKT",
            storageBucket: "DEIN_PROJEKT.appspot.com",
            messagingSenderId: "DEINE_ID",
            appId: "DEINE_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let roomCode = "";
        let isHost = false;

        // --- AUDIO SETUP ---
        // Definiert die drei Audio-Dateien aus deinem GitHub-Ordner
        const explosionSounds = [
            new Audio('a1.mp3'),
            new Audio('a2.mp3'),
            new Audio('a3.mp3')
        ];

        // Funktion zum Abspielen eines zufälligen Sounds
        function playRandomExplosion() {
            const randomIndex = Math.floor(Math.random() * explosionSounds.length);
            const sound = explosionSounds[randomIndex];
            sound.currentTime = 0; 
            sound.play().catch(e => console.log("Audio-Fehler (Interaktion nötig oder Datei fehlt):", e));
        }

        function changeTheme() {
            const t = document.getElementById('themeSelect').value;
            document.body.className = t;
        }

        function createRoom() {
            myName = document.getElementById('userName').value.trim();
            if(!myName) return alert("Wie heißt du?");
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            db.ref('rooms/' + roomCode).set({
                status: 'lobby',
                currentProb: 2,
                turnIndex: 0,
                players: [{ name: myName, score: 0 }]
            });
            listen();
        }

        function joinRoom() {
            myName = document.getElementById('userName').value.trim();
            roomCode = document.getElementById('roomCodeInput').value.trim();
            if(!myName || !roomCode) return alert("Daten fehlen!");
            db.ref('rooms/' + roomCode).once('value', s => {
                if(!s.exists()) return alert("Raum existiert nicht!");
                let p = s.val().players || [];
                p.push({ name: myName, score: 0 });
                db.ref('rooms/' + roomCode).update({ players: p });
                listen();
            });
        }

        function listen() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('displayRoomCode').innerText = roomCode;

            db.ref('rooms/' + roomCode).on('value', s => {
                const data = s.val();
                if(!data) return;
                
                if(data.status === 'lobby') {
                    document.getElementById('lobbyPlayerList').innerHTML = data.players.map(p => `
                        <div style="padding:10px; border-bottom:1px solid var(--subtle)">• ${p.name}</div>
                    `).join('');
                    if(isHost && data.players.length >= 2) document.getElementById('startBtn').style.display='block';
                } else if(data.status === 'playing') {
                    updateGameUI(data);
                }
            });
        }

        function startOnlineGame() {
            db.ref('rooms/' + roomCode).update({ status: 'playing' });
        }

        function updateGameUI(data) {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');

            const cur = data.players[data.turnIndex];
            const isMe = cur.name === myName;

            document.getElementById('turnInfo').innerText = isMe ? "DU BIST DRAN!" : `${cur.name} drückt gerade...`;
            document.getElementById('probFill').style.width = data.currentProb + "%";
            document.getElementById('probText').innerText = `${data.currentProb}%`;
            
            document.getElementById('onlineScoreBoard').innerHTML = data.players.map((p, i) => `
                <div class="score-row ${i === data.turnIndex ? 'active' : ''}">
                    <span>${p.name}</span><span>${p.score}</span>
                </div>
            `).join('');

            const btn = document.getElementById('mainTrigger');
            if(isMe) {
                document.body.classList.add('active-turn');
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            } else {
                document.body.classList.remove('active-turn');
                btn.style.opacity = "0.3";
                btn.style.pointerEvents = "none";
            }
        }

        function handleAction() {
            db.ref('rooms/' + roomCode).once('value', s => {
                let data = s.val();
                
                // Berechnung der Explosion
                if(Math.random() * 100 < data.currentProb) {
                    // --- EXPLOSION AUSGELÖST ---
                    playRandomExplosion(); // Spielt einen der 3 Zufalls-Sounds ab
                    
                    const label = document.getElementById('triggerLabel');
                    label.innerText = "BOOM!";
                    label.style.color = "var(--danger)";
                    setTimeout(() => {
                        label.innerText = "DRÜCKEN";
                        label.style.color = "inherit";
                    }, 1500);
                    
                    data.currentProb = 2; // Wahrscheinlichkeit zurücksetzen
                } else {
                    // --- SICHERER KLICK ---
                    data.players[data.turnIndex].score += Math.floor(data.currentProb);
                    data.currentProb += 2; 
                }

                // Nächster Spieler
                data.turnIndex = (data.turnIndex + 1) % data.players.length;
                db.ref('rooms/' + roomCode).update(data);
            });
        }
    </script>
</body>
</html>
