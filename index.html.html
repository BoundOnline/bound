<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOUND // Premium</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --text: #ffffff;
            --accent: #0a84ff; --subtle: #2c2c2e; --danger: #ff3b30;
        }
        body.theme-crimson { --accent: #ff375f; }
        body.theme-emerald { --accent: #32d74b; }
        body.theme-gold { --accent: #ffd60a; }
        body.theme-light { --bg: #f2f2f7; --card: #ffffff; --text: #000000; --subtle: #e5e5ea; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            transition: all 0.4s ease; overflow: hidden;
        }

        .app-container { width: 100%; max-width: 400px; padding: 20px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        /* LOGO */
        .logo-wrapper { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; gap: 12px; }
        .logo-symbol { width: 35px; height: 35px; position: relative; display: flex; align-items: center; justify-content: center; }
        .symbol-hex { position: absolute; width: 100%; height: 100%; border: 4px solid var(--accent); border-radius: 8px; transform: rotate(45deg); transition: border-color 0.4s; }
        .logo-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 2rem; letter-spacing: -1.5px; }

        /* UI BOXES */
        .glass-box { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; border: none; background: var(--subtle); color: var(--text); border-radius: 14px; font-size: 1rem; font-weight: 600; outline: none; margin-bottom: 10px; }
        
        .btn { background: var(--accent); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 16px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
        .btn-secondary { background: var(--subtle); color: var(--text); }
        .btn:active { transform: scale(0.97); }

        /* GAME UI */
        .score-row { display: flex; justify-content: space-between; padding: 12px 16px; border-radius: 12px; margin-bottom: 6px; background: var(--subtle); opacity: 0.6; transition: all 0.3s; }
        .score-row.active { opacity: 1; transform: scale(1.03); background: var(--accent); color: #fff; font-weight: 800; box-shadow: 0 4px 15px var(--accent); }

        .prob-bar-container { width: 100%; background: var(--subtle); height: 8px; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .prob-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s cubic-bezier(0.1, 0.7, 1.0, 0.1); }

        .trigger-circle { width: 190px; height: 190px; background: var(--card); border-radius: 50%; margin: 20px auto; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 6px solid var(--subtle); transition: border-color 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .active-turn .trigger-circle { border-color: var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(10, 132, 255, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(10, 132, 255, 0); } 100% { box-shadow: 0 0 0 0px rgba(10, 132, 255, 0); } }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(5px); }
        .hidden { display: none; }
    </style>
</head>
<body class="theme-midnight">

    <div class="app-container" id="screen-home">
        <div class="logo-wrapper">
            <div class="logo-symbol"><div class="symbol-hex"></div></div>
            <div class="logo-text">BOUND</div>
        </div>
        <div class="glass-box">
            <input type="text" id="userName" placeholder="Dein Name">
            <button class="btn" onclick="createRoom()">Party erstellen</button>
            <button class="btn btn-secondary" style="margin-top:8px" onclick="joinRoom()">Beitreten</button>
            <input type="text" id="roomCodeInput" placeholder="Code" style="margin-top:10px; text-align:center; letter-spacing:4px">
        </div>
        <button class="btn btn-secondary" onclick="document.getElementById('modalSettings').style.display='flex'">Einstellungen</button>
    </div>

    <div class="app-container hidden" id="screen-lobby">
        <h3 style="opacity:0.5; margin-bottom:5px">RAUM-CODE</h3>
        <h1 id="displayRoomCode" style="font-size:3rem; margin:0; color:var(--accent); letter-spacing:5px">----</h1>
        <div class="glass-box" style="margin-top:20px">
            <div id="lobbyPlayerList" style="text-align:left"></div>
            <button class="btn" id="startBtn" style="display:none; margin-top:15px" onclick="startOnlineGame()">Spiel starten</button>
        </div>
    </div>

    <div class="app-container hidden" id="screen-game">
        <div id="onlineScoreBoard" style="margin-bottom:20px"></div>
        
        <div class="prob-bar-container"><div class="prob-bar-fill" id="probFill"></div></div>
        <div id="probText" style="font-weight:800; font-size:1.1rem; color:var(--accent)">2% Chance</div>

        <div class="trigger-circle" id="mainTrigger" onclick="handleAction()">
            <div style="font-weight:900; font-size:1.3rem; letter-spacing:1px" id="triggerLabel">DRÜCKEN</div>
        </div>
        <p id="turnInfo" style="font-weight:600; opacity:0.6; margin-top:10px">Warten...</p>
    </div>

    <div class="modal" id="modalSettings">
        <div class="glass-box" style="width:100%; max-width:320px">
            <h2 style="margin-top:0">Design</h2>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="theme-midnight">Midnight (Blau)</option>
                <option value="theme-crimson">Crimson (Rot)</option>
                <option value="theme-emerald">Emerald (Grün)</option>
                <option value="theme-gold">Gold (Gelb)</option>
                <option value="theme-light">Snow (Hell)</option>
            </select>
            <button class="btn" style="margin-top:10px" onclick="document.getElementById('modalSettings').style.display='none'">Fertig</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCrFeaJLo7LS6hHml8yu8Fh7Z4mklh38uw",
            authDomain: "boundonline-538df.firebaseapp.com",
            projectId: "boundonline-538df",
            storageBucket: "boundonline-538df.firebasestorage.app",
            messagingSenderId: "144308798711",
            appId: "1:144308798711:web:ef6f0d619896e533f57ff2",
            databaseURL: "https://boundonline-538df-default-rtdb.europe-west1.firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = "";
        let roomCode = "";
        let isHost = false;
        const insults = ["VERSAGER", "PIMMELKOPF", "SCHEISSE", "HURENSOHN", "LOOSER"];

        function changeTheme() {
            const t = document.getElementById('themeSelect').value;
            document.body.className = t;
        }

        function createRoom() {
            myName = document.getElementById('userName').value.trim();
            if(!myName) return alert("Name?");
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isHost = true;
            db.ref('rooms/' + roomCode).set({
                status: 'lobby',
                currentProb: 2,
                turnIndex: 0,
                players: [{ name: myName, score: 0 }]
            });
            listen();
        }

        function joinRoom() {
            myName = document.getElementById('userName').value.trim();
            roomCode = document.getElementById('roomCodeInput').value.trim();
            if(!myName || !roomCode) return alert("Daten?");
            db.ref('rooms/' + roomCode).once('value', s => {
                if(!s.exists()) return alert("Kein Raum!");
                let p = s.val().players || [];
                p.push({ name: myName, score: 0 });
                db.ref('rooms/' + roomCode).update({ players: p });
                listen();
            });
        }

        function listen() {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-lobby').classList.remove('hidden');
            document.getElementById('displayRoomCode').innerText = roomCode;

            db.ref('rooms/' + roomCode).on('value', s => {
                const data = s.val();
                if(!data) return;
                
                if(data.status === 'lobby') {
                    document.getElementById('lobbyPlayerList').innerHTML = data.players.map(p => `
                        <div style="padding:10px; border-bottom:1px solid var(--subtle)">• ${p.name}</div>
                    `).join('');
                    if(isHost && data.players.length >= 2) document.getElementById('startBtn').style.display='block';
                } else if(data.status === 'playing') {
                    updateGameUI(data);
                }
            });
        }

        function startOnlineGame() {
            db.ref('rooms/' + roomCode).update({ status: 'playing' });
        }

        function updateGameUI(data) {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');

            const cur = data.players[data.turnIndex];
            const isMe = cur.name === myName;

            document.getElementById('turnInfo').innerText = isMe ? "DEIN ZUG" : `${cur.name} drückt...`;
            document.getElementById('probFill').style.width = data.currentProb + "%";
            document.getElementById('probText').innerText = `${data.currentProb}% GEFAHR`;
            
            document.getElementById('onlineScoreBoard').innerHTML = data.players.map((p, i) => `
                <div class="score-row ${i === data.turnIndex ? 'active' : ''}">
                    <span>${p.name}</span><span>${p.score}</span>
                </div>
            `).join('');

            const btn = document.getElementById('mainTrigger');
            if(isMe) {
                document.body.classList.add('active-turn');
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            } else {
                document.body.classList.remove('active-turn');
                btn.style.opacity = "0.3";
                btn.style.pointerEvents = "none";
            }
        }

        function handleAction() {
            db.ref('rooms/' + roomCode).once('value', s => {
                let data = s.val();
                if(Math.random() * 100 < data.currentProb) {
                    const ut = new SpeechSynthesisUtterance(insults[Math.floor(Math.random()*insults.length)]);
                    ut.lang = 'de-DE'; ut.pitch = 0.5;
                    window.speechSynthesis.speak(ut);
                    data.currentProb = 2;
                } else {
                    data.players[data.turnIndex].score += Math.floor(data.currentProb);
                    data.currentProb += 2; // Geringerer Anstieg
                }
                data.turnIndex = (data.turnIndex + 1) % data.players.length;
                db.ref('rooms/' + roomCode).update(data);
            });
        }
    </script>
</body>
</html>
